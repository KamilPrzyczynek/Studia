<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Kontakt</title>
</head>
<body>
    <nav>  
        <div class="navbar"></div>     
    </nav>

    <section class="d-flex justify-content-center">
        <form action="" class="card">
            <fieldset>
                <legend>Uzupełnij dane:</legend>
                <div class="mb-3">
                    <label for="" class="form-label">Imie</label><br>
                    <input type="text" name="" id="" class="form-control">
                </div>
    
                <div class="mb-3">
                    <label for="" class="form-label">Nazwisko</label><br>
                    <input type="text" name="" id="" class="form-control">
                </div>
                
                <div class="mb-3">
                    <label for="" class="form-label">E-mail</label><br>
                    <input type="text" name="" id="" class="form-control">
                </div>
    
                <div class="mb-3">
                    <label for="" class="form-label">Płeć</label><br>
                    <div class="d-flex flex-row justify-content-around">
                        <div><input type="radio" name="plec" id="ma" class="flex-fill">Mężczyzna</div>
                        <div><input type="radio" name="plec" id="wa" class="flex-fill">Kobieta</div>
                    </div>
                </div>
    
                <div class="mb-3">
                    <label for="" class="form-label">Opis</label><br>
                    <textarea name="" id="" cols="30" rows="10" class="form-control"></textarea>
                </div>
    
                <div class="mb-3">
                    <label for="" class="form-label">Wiek</label><br>
                    <input type="number" name="" id="" class="form-control">
                </div>
    
                <div class="mb-3">
                    <label for="" class="form-label">Stan cywilny</label><br>
                    <select name="" id="" class="form-control">
                        <option value="">Panna/Kawaler</option>
                        <option value="">Zamężna/nie wiem jak się to odmienia</option>
                        <option value="c">Wdowa/Wdowie</option>
                    </select>
                </div>
    
                <div class="mb-3 d-flex">
                    <input type="reset" value="Wyczyść" class="btn btn-danger flex-fill">
                    <input type="submit" value="Wyślij" class="btn btn-success flex-fill">
                </div>
                
            </fieldset>
        </form>
    </section>
    <footer class="center">
        <span>Copyrights &copy;Imie nazwisk | 2023</span>
    </footer>

    <script src="js/navbar.js"></script>
</body>
</html>
