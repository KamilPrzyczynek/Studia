
<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="utf-8">
    <title>HTML5 EXAMPLE</title>

    <meta name="description" content="Tomasz Gądek, Strona Domowa">
    <meta name="author" content="Tomasz Gądek">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="icon" type="image/png" href="/images/favicon.png">

    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(255, 255, 255);
            color: #000;
        }

        header {
            width: 100%;
            background-color: #0f99ae;
        }

        nav {
            width: 96%;
            background-color: #68ac76;
            margin: 0 2%;
        }

        header h1 {
            width: 96%;
            background-color: #c47c1e;
            margin: 0 2%;
        }

        main {
            width: 70%;
            height: 500px;
            background-color: #ae1272;
            float: left;
        }

        aside {
            width: 30%;
            height: 500px;
            background-color: #ff70e0;
            float: left;
        }

        footer {
            width: 100%;
            background-color: #c9cb3c;
            clear: both;
        }

        article, span {
            margin: 20px;
            background-color: #279ba8;

        }

        section, div {
            margin: 20px;
            background-color: #a667c1;
        }

    </style>
</head>

<body >
    <header>
        <br>
        <h1>Moja strona www</h1>
        <nav>Nawigacja strony</nav>
        <br>
    </header>
    <main>
        <section>
            <article>to jest bardzo piękna strona www<br>Jest ona wspaniała</article>

        </section>
        <div>
            <span>Polacy grają tragicznie</span><br>
            <span>szkogda mówic</span><br>
            <audio controls src="./Ludwig Van Beethoven - V Symfonia.mp3"></audio>
        </div>
    </main>
    <aside>
        <video controls width="100%">
            <source src="./MESSI PO MECZU Z POLSKĄ.mp4">
        </video>
    </aside>

    <footer>

        Stopka strony<br>
      
    </footer>

</body>

</html>
